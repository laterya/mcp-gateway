<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Gateway · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',-apple-system,sans-serif; background:#0c0c10; color:#e8e8ed; display:flex; align-items:center; justify-content:center; height:100vh; -webkit-font-smoothing:antialiased; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px); background-size:20px 20px; }
.login-box { background:#15151b; border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:40px; width:380px; }
.login-box h1 { font-size:22px; font-weight:600; margin-bottom:4px; font-family:'JetBrains Mono',monospace; }
.login-box h1 span { color:#5eead4; }
.login-box .sub { font-size:12px; color:#686878; font-family:'JetBrains Mono',monospace; margin-bottom:28px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:12px; font-weight:500; color:#9898a8; margin-bottom:6px; }
.form-group input { width:100%; padding:10px 14px; background:#1c1c25; border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#e8e8ed; font-size:13px; font-family:'DM Sans',sans-serif; }
.form-group input:focus { outline:none; border-color:#5eead4; box-shadow:0 0 0 3px rgba(94,234,212,0.12); }
.btn { width:100%; padding:12px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:#5eead4; color:#000; font-family:'DM Sans',sans-serif; margin-top:10px; transition:all 180ms; }
.btn:hover { background:#6fe8da; box-shadow:0 0 16px rgba(94,234,212,0.25); }
.error { font-size:12px; color:#f87171; margin-top:8px; display:none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>MCP<span>Gateway</span></h1>
  <div class="sub">管理控制台</div>
  <form onsubmit="login(event)">
    <div class="form-group"><label>用户名</label><input type="text" id="username" placeholder="admin"></div>
    <div class="form-group"><label>密码</label><input type="password" id="password" placeholder="password123"></div>
    <div class="error" id="error">用户名或密码错误</div>
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
<script>
function login(e) {
  e.preventDefault();
  const u = document.getElementById('username').value, p = document.getElementById('password').value;
  if (u === 'admin' && p === 'password123') { localStorage.setItem('mcp_admin_logged_in','true'); window.location.href='admin.html'; }
  else document.getElementById('error').style.display='block';
}
</script>
</body>
</html>
